# SPDX-License-Identifier: Apache-2.0
#
# build-images.yml — build and push ghcr.io images for all three TiDB-patched
# Ory components (Kratos, Keto, Hydra).
#
# Triggered on:
#   - push to main (submodule pointer update → new component commit landed)
#   - manual workflow_dispatch (rebuild on demand)
#   - weekly schedule (keep images fresh even without code changes)
#
# Each component is built in parallel as a separate matrix job.
# Images are tagged with both the git SHA of the component submodule and
# "latest" (on main branch only).
#
# Image names:
#   ghcr.io/<owner>/ory-tidb-kratos:<sha>
#   ghcr.io/<owner>/ory-tidb-keto:<sha>
#   ghcr.io/<owner>/ory-tidb-hydra:<sha>

name: build-images

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 5 * * 1"   # weekly Monday 05:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: kratos
            dockerfile: .docker/Dockerfile-build
            build_args: |
              VERSION=${{ github.sha }}
              COMMIT=${{ github.sha }}
              BUILD_DATE=${{ github.event.head_commit.timestamp }}

          - component: keto
            dockerfile: .docker/Dockerfile-build
            build_args: ""

          - component: hydra
            dockerfile: .docker/Dockerfile-local-build
            build_args: ""

    steps:
      - name: Checkout ory-tidb (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Get component SHA
        id: sha
        run: |
          sha=$(git -C ${{ matrix.component }} rev-parse HEAD)
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "short=${sha:0:12}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.component }}/go.mod
          cache-dependency-path: ${{ matrix.component }}/go.sum

      - name: Test pop TiDB dialect
        working-directory: pop
        run: go test -run "Test_TiDB" -v .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.component }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component }}/${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/ory-tidb-${{ matrix.component }}:${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/ory-tidb-${{ matrix.component }}:latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      - name: Check ${{ matrix.component }} image migrations
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/ory-tidb-${{ matrix.component }}@${{ steps.build.outputs.digest }}"
          sh scripts/check_image_migrations.sh --only ${{ matrix.component }} --${{ matrix.component }} "${IMAGE}"

      - name: Output image ref
        run: |
          echo "Built: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/ory-tidb-${{ matrix.component }}:${{ steps.sha.outputs.short }}"
